<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu - Sprout House</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌿 Sprout House Menu</h1>
    <a href="index.html" class="home-link">🏠 Back Home</a>
</header>
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search food or category...">
    <div id="suggestions" class="suggestions"></div>
</div>
<!-- CATEGORY NAV -->
 <div class="menu">
<div class="category-card">
    <a class="menu-item" href="Breakfast.html">Breakfast</a>
    <a class="menu-item" href="Soups.html">Soups</a>
    <a class="menu-item" href="Pasta.html">Pasta</a>
    <a class="menu-item" href="Salads.html">Salads</a>
    <a class="menu-item" href="Beef.html">Beef</a>
    <a class="menu-item" href="Chicken.html">Chicken</a>
    <a class="menu-item" href="Fish.html">Fish</a>
    <a class="menu-item" href="Burger.html">Burgers</a>
    <a class="menu-item" href="Sandwiches.html">Sandwiches</a>
    <a class="menu-item" href="Lamb.html">Lamb</a>
    <a class="menu-item" href="Pork.html">Pork</a>
    <a class="menu-item" href="Pizzas.html">Pizzas</a>
    <a class="menu-item" href="Starters.html">Starters</a>
    <a class="menu-item" href="SeaFood.html">Sea Food</a>
    <a class="menu-item" href="SproutHousePlatter.html">SproutHouse Platters</a>
    <a class="menu-item" href="Wraps.html">Wraps</a>
     <a class="menu-item" href="AddOns.html">Add Ons</a>
     <a class="menu-item" href="Beverage.html">Beverages</a>
</div>
</div>

<script>
const searchInput = document.getElementById("searchInput");
const suggestionsBox = document.getElementById("suggestions");

// ALL SEARCHABLE DATA (categories + foods)
const data = [
    "Breakfast", "Pancakes", "Omelette", "French Toast",
    "Soups", "Chicken Soup", "Vegetable Soup",
    "Pasta", "Chicken Alfredo", "Spaghetti Bolognese",
    "Salads", "Greek Salad", "Avocado Salad",
    "Beef", "Beef Steak",
    "Chicken", "Grilled Chicken",
    "Fish", "Tilapia",
    "Burgers", "Beef Burger",
    "Wraps", "Chicken Wrap",
    "Drinks", "Fresh Juice", "Soda"
];

// LIVE FILTER SECTIONS
searchInput.addEventListener("keyup", function () {
    let value = searchInput.value.toLowerCase();

    // FILTER CATEGORIES
    let categories = document.querySelectorAll(".category");

    categories.forEach(cat => {
        let text = cat.textContent.toLowerCase();

        if (text.includes(value)) {
            cat.style.display = "block";
        } else {
            cat.style.display = "none";
        }
    });

    // SHOW SUGGESTIONS
    if (value.length === 0) {
        suggestionsBox.style.display = "none";
        return;
    }

    let matches = data.filter(item =>
        item.toLowerCase().includes(value)
    );

    suggestionsBox.innerHTML = "";
    suggestionsBox.style.display = "block";

    matches.forEach(match => {
        let div = document.createElement("div");
        div.classList.add("suggestion-item");
        div.innerText = match;

        // click suggestion fills input
        div.onclick = function () {
            searchInput.value = match;
            suggestionsBox.style.display = "none";

            // trigger filter again
            searchInput.dispatchEvent(new Event("keyup"));
        };

        suggestionsBox.appendChild(div);
    });
});
</script>
</body>
</html>
