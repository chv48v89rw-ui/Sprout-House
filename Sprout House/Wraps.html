<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Prices - Sprout House</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>💰 Edit Menu Prices</h1>
    <a href="index.html" class="home-link">🏠 Back Home</a>
</header>

<div class="menu">

    <div class="category card">
        <h2>Breakfast</h2>

        <label>Pancakes Price</label>
        <input type="number" id="inp_pancakes" value="300">
        <button onclick="updatePrice('p_pancakes','inp_pancakes')">Update</button>
    </div>

    <div class="category card">
        <h2>Soups</h2>

        <label>Chicken Soup Price</label>
        <input type="number" id="inp_soup" value="350">
        <button onclick="updatePrice('p_soup','inp_soup')">Update</button>
    </div>

    <div class="category card">
        <h2>Pasta</h2>

        <label>Chicken Alfredo Price</label>
        <input type="number" id="inp_pasta" value="600">
        <button onclick="updatePrice('p_pasta','inp_pasta')">Update</button>
    </div>

</div>

<script>
function updatePrice(displayId, inputId) {
    let value = document.getElementById(inputId).value;
    document.getElementById(displayId).innerText = value;
    alert("Price updated!");
}
</script>

</body>
</html>
